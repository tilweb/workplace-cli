name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Sync deps
        run: uv sync --all-extras --frozen
      - name: Ruff check
        run: uv run ruff check vibe/

  build-and-smoke:
    name: Build + Smoke-Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Sync deps
        run: uv sync --all-extras --frozen
      - name: Build wheel
        run: uv build
      - name: Verify wheel name
        run: |
          set -e
          ls -l dist/
          test -f dist/workplace_cli-*.whl || (echo "::error::No workplace_cli wheel built"; exit 1)
      - name: Install built wheel into venv
        run: |
          uv pip install --no-deps dist/workplace_cli-*.whl
      - name: Smoke-Test — version + binary present
        run: |
          set -e
          echo "Testing 'workplace --version'"
          uv run workplace --version
          uv run workplace --version | grep -F "1.0.0" || (echo "::error::workplace --version does not show 1.0.0"; exit 1)
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v5
        with:
          name: workplace-cli-wheel
          path: dist/*.whl
          retention-days: 30
